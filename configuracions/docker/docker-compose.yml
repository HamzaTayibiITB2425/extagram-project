services:
  s1-loadbalancer:
    image: nginx:alpine
    container_name: extagram-s1-loadbalancer
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./s1-loadbalancer/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./s2-s3-php:/var/www/html:ro
    networks:
      - extagram_front
      - extagram_services
      - monitoring
    depends_on:
      - s2-php
      - s3-php
      - s4-upload
      - s5-images
      - s6-static

  s2-php:
    build: ./s2-s3-php
    container_name: extagram-s2-php
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./s2-s3-php:/var/www/html:ro
    depends_on:
      s7-database:
        condition: service_healthy
    networks:
      - extagram_services
      - extagram_data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:mode=1777

  s3-php:
    build: ./s2-s3-php
    container_name: extagram-s3-php
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./s2-s3-php:/var/www/html:ro
    depends_on:
      s7-database:
        condition: service_healthy
    networks:
      - extagram_services
      - extagram_data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:mode=1777

  s4-upload:
    build: ./s4-upload
    container_name: extagram-s4-upload
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./s4-upload/upload.php:/var/www/html/upload.php:ro
      - ./s4-upload/delete.php:/var/www/html/delete.php:ro
      - ./s4-upload/recover.php:/var/www/html/recover.php:ro
      - uploads_data:/var/www/html/uploads
    depends_on:
      s7-database:
        condition: service_healthy
    networks:
      - extagram_services
      - extagram_data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE

  s5-images:
    build: ./s5-images
    container_name: extagram-s5-images
    volumes:
      - uploads_data:/var/www/html/uploads:ro
    networks:
      - extagram_services
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755

  s6-static:
    build: ./s6-static
    container_name: extagram-s6-static
    networks:
      - extagram_services
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755

  s7-database:
    image: mysql:8
    container_name: extagram-s7-database
    command: >
      sh -c "
      docker-entrypoint.sh mysqld --general-log=1 --general-log-file=/var/log/mysql/general.log --local-infile=0 --skip-show-database --max-allowed-packet=16M &
      MYSQL_PID=\$$!;
      sleep 8;
      tail -f /var/log/mysql/general.log | 
      tr -cd '\\11\\12\\15\\40-\\176' | 
      grep --line-buffered -E '(Connect|Query|INSERT|SELECT|UPDATE|DELETE|Prepare|Execute|Close|Quit)' | 
      sed -u 's/VALUES ([^,]*, [^,]*, .*/VALUES (caption, image_path, [BLOB_OMITIDO])/' &
      wait \$$MYSQL_PID
      "
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./s7-mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./s7-mysql/hardening.sql:/docker-entrypoint-initdb.d/02-hardening.sql:ro
    networks:
      - extagram_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  s8-ldap:
    build: ./s8-ldap
    container_name: extagram-s8-ldap
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_USER_PASSWORD: ${LDAP_USER_PASSWORD}
      CONTAINER_LOG_LEVEL: debug
    networks:
      - extagram_data
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: extagram-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_DOMAIN=extagram-grup3.duckdns.org
      - GF_SERVER_ROOT_URL=https://extagram-grup3.duckdns.org/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home.json
      - GF_NEWS_NEWS_FEED_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - loki
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: extagram-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - ./monitoring/loki/data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: extagram-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: extagram-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=https://extagram-grup3.duckdns.org/prometheus/'
      - '--web.route-prefix=/'
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: extagram-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    command:
      - '--url_base_prefix=/cadvisor'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/cadvisor/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - monitoring

networks:
  extagram_front:
    driver: bridge
  extagram_services:
    driver: bridge
  extagram_data:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  db_data:
  uploads_data:
  grafana-data:
  loki-data:
  prometheus-data:
