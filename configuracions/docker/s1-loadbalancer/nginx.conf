user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    resolver 127.0.0.11 valid=30s;

    upstream php_backend {
        server s2-php:9000;
        server s3-php:9000;
    }

    upstream upload_backend {
        server s4-upload:9000;
    }

    upstream images_backend {
        server s5-images:80;
    }

    upstream static_backend {
        server s6-static:80;
    }

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    server {
        listen 80;
        listen [::]:80;
        server_name extagram-grup3.duckdns.org;

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name extagram-grup3.duckdns.org localhost;

        ssl_certificate /etc/letsencrypt/live/extagram-grup3.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/extagram-grup3.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # WAF Rules - SQL Injection
        if ($query_string ~* "union.*select|insert.*into|delete.*from|drop.*table|update.*set") {
            return 403 "WAF: SQL Injection Blocked";
        }

        if ($request_uri ~* "union.*select|insert.*into|delete.*from|drop.*table|update.*set") {
            return 403 "WAF: SQL Injection Blocked";
        }

        # WAF Rules - XSS
        if ($query_string ~* "<script|javascript:|eval\(|alert\(|onerror=") {
            return 403 "WAF: XSS Attack Blocked";
        }

        if ($request_uri ~* "<script|javascript:|eval\(|alert\(|onerror=") {
            return 403 "WAF: XSS Attack Blocked";
        }

        # WAF Rules - Path Traversal
        if ($request_uri ~* "\.\./|/etc/passwd|/etc/shadow") {
            return 403 "WAF: Path Traversal Blocked";
        }

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        root /var/www/html;
        index extagram.php;

        location /grafana/ {
            proxy_pass http://grafana:3000/grafana/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering off;
            proxy_redirect off;
        }

        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /cadvisor/ {
            rewrite ^/cadvisor/(.*) /cadvisor/$1 break;
            proxy_pass http://cadvisor:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/(upload\.php|delete\.php|recover\.php)$ {
            limit_req zone=general burst=20 nodelay;

            fastcgi_pass upload_backend;
            fastcgi_index upload.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
            include fastcgi_params;

            fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M";
            fastcgi_read_timeout 300;

            client_max_body_size 10M;
        }

        location ~ \.php$ {
            limit_req zone=general burst=20 nodelay;

            try_files $uri =404;

            fastcgi_pass php_backend;
            fastcgi_index extagram.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M";
            fastcgi_read_timeout 300;
        }

        location /uploads/ {
            proxy_pass http://images_backend/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_cache_valid 200 1d;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location ~* ^/(?!grafana/|prometheus/|cadvisor/).*\.(css|svg|ico)$ {
            proxy_pass http://static_backend;
            proxy_set_header Host $host;

            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location = / {
            return 301 /extagram.php;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
